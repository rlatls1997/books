  };

  document.getElementById('cReset').onclick=reset;
  reset();
}

/* ---- 2. Size bar comparison ---- */
function setupSizeBar(){
  animState.sizebar=true;
  const container=document.getElementById('sizeBars');
  const st=document.getElementById('szStatus');
  const data=[
    {cls:'json', label:'Text JSON', bytes:81, max:100, color:'#8a7f6a'},
    {cls:'mp',   label:'MessagePack', bytes:66, max:100, color:'#b8860b'},
    {cls:'pb',   label:'Protocol Buffers', bytes:33, max:100, color:'#1b6b6b'},
    {cls:'av',   label:'Avro', bytes:32, max:100, color:'#c0392b'},
  ];
  function render(filled){
    container.innerHTML=data.map((d,i)=>{
      const w=filled?(d.bytes/d.max*100):0;
      return `<div class="size-bar ${d.cls}">
        <div class="bar-label">${d.label}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${w}%">${filled?d.bytes+' bytes':''}</div>
        </div>
      </div>`;
    }).join('');
  }
  document.getElementById('szPlay').onclick=()=>{
    render(true);
    st.textContent='✓ Avro 32B / Protobuf 33B — 텍스트 JSON보다 60% 이상 줄어듦';
  };
  document.getElementById('szReset').onclick=()=>{
    render(false);
    st.textContent='시작하려면 버튼을 누르세요';
  };
  render(false);
}

/* ---- 3. Protobuf schema evolution ---- */
function setupProtoEvo(){
  animState.protoevo=true;
  const oldEl=document.getElementById('oldSchema');
  const newEl=document.getElementById('newSchema');
  const msgEl=document.getElementById('peMsg');

  const initialFields=[
    {tag:1, name:'user_name', type:'string'},
    {tag:2, name:'favorite_number', type:'int64'},
    {tag:3, name:'interests', type:'repeated string'},
  ];
  let newFields=JSON.parse(JSON.stringify(initialFields));

  function format(fields, oldFields){
    let h='<span style="color:#f0c674">message</span> Person {<br>';
    fields.forEach(f=>{
      let cls='keep';
      let suffix='';
      if(f._added) cls='add', suffix=' <span style="color:#a9c98a">// NEW</span>';
      if(f._removed) cls='del';
      if(f._renamed) cls='add', suffix=' <span style="color:#a9c98a">// renamed</span>';
      if(f._reuseTag) cls='del', suffix=' <span style="color:#e0907a">// ⚠ 태그 재사용!</span>';
      h+=`&nbsp;&nbsp;<span class="${cls}">${f.type} ${f.name} = ${f.tag};</span>${suffix}<br>`;
    });
    h+='}';
    return h;
  }
  function render(){
    oldEl.innerHTML=format(initialFields);
    newEl.innerHTML=format(newFields);
  }
  function reset(){
    newFields=JSON.parse(JSON.stringify(initialFields));
    render();
    msgEl.innerHTML='버튼을 눌러 스키마를 진화시켜 보세요. 각 변경이 양방향 호환에 어떤 영향을 주는지 표시됨.';
  }

  document.getElementById('peAddSafe').onclick=()=>{
    // 이미 추가되어 있으면 아무것도 안함
    if(newFields.some(f=>f.tag===4)){
      msgEl.innerHTML='이미 태그 4 필드가 존재함. 리셋 후 다시 시도하세요.';
      return;
    }
    newFields.push({tag:4, name:'email', type:'string', _added:true});
    render();
    msgEl.innerHTML='<b style="color:var(--accent2)">✓ 안전</b> · 태그 4로 새 필드 추가. <b>옛 코드</b>는 인식 못 해 무시(상위 호환 ✓). <b>새 코드</b>는 옛 데이터를 읽으면 email 필드를 기본값으로 채움(하위 호환 ✓).';
  };

  document.getElementById('peRename').onclick=()=>{
    const f=newFields.find(x=>x.name==='user_name');
    if(f && !f._renamed){
      f.name='username';
      f._renamed=true;
      render();
      msgEl.innerHTML='<b style="color:var(--accent2)">✓ 안전</b> · 필드 이름을 user_name → username으로 변경. <b>인코딩 데이터는 필드 이름을 참조하지 않으므로</b> 호환성에 영향 없음. (태그 번호 1만 의미가 있음)';
    } else {
      msgEl.innerHTML='이미 이름을 변경했음. 리셋 후 다시 시도하세요.';
    }
  };

  document.getElementById('peRemove').onclick=()=>{
    const idx=newFields.findIndex(x=>x.tag===2);
    if(idx>=0 && !newFields[idx]._removed){
      newFields[idx]._removed=true;
      render();
      msgEl.innerHTML='<b style="color:var(--gold)">⚠ 조심</b> · 태그 2(favorite_number) 제거. <b>이 태그 번호는 영원히 봉인</b>해야 함 — 다시는 다른 의미로 재사용하면 안 됨. 옛 데이터에는 이 필드가 남아 있을 수 있음.';
    } else {
      msgEl.innerHTML='이미 제거되었음.';
    }
  };

  document.getElementById('peReuseTag').onclick=()=>{
    // 태그 2를 다른 의미로 재사용 시도
    const idx=newFields.findIndex(x=>x.tag===2);
    if(idx>=0){
      newFields[idx]={tag:2, name:'phone', type:'string', _reuseTag:true};
      render();
      msgEl.innerHTML='<b style="color:var(--accent)">⚠⚠ 치명적 오류!</b> · 태그 2를 phone 필드로 재사용. <b>옛 데이터의 favorite_number(int64)가 phone(string)으로 잘못 해석</b>되어 데이터가 깨짐. <b>제거한 태그는 절대 재사용 금지.</b>';
    }
  };

  document.getElementById('peReset').onclick=reset;
  reset();
}

/* ---- 4. Avro Reader/Writer schema resolution ---- */
function setupAvroResolve(){
  animState.avroresolve=true;
  const wEl=document.getElementById('avW');
  const rEl=document.getElementById('avR');
  const stEl=document.getElementById('avStatus');
  let step=0;

  // writer schema has: userName, favoriteNumber (writer-only field), interests
  // reader schema has: interests (different order), userName, email (reader-only with default)
  const writerFields=[
    {name:'userName', type:'string'},
    {name:'favoriteNumber', type:'long'},
    {name:'interests', type:'array'},
  ];
  const readerFields=[
    {name:'interests', type:'array'},
    {name:'userName', type:'string'},
    {name:'email', type:'string', default:'"none"'},
  ];

  function render(){
    // step 0: 그냥 양쪽 다 표시
    // step 1: 순서 무관 — 이름으로 매칭 → userName, interests 매칭
    // step 2: writer-only — favoriteNumber는 reader가 모름 → 무시
    // step 3: reader-only — email은 writer에 없음 → default

    const wState=writerFields.map(f=>{
      let cls='';
      if(step>=1 && (f.name==='userName' || f.name==='interests')) cls='matched';
      if(step>=2 && f.name==='favoriteNumber') cls='skipped';
      return {f,cls};
    });
    const rState=readerFields.map(f=>{
      let cls='';
      if(step>=1 && (f.name==='userName' || f.name==='interests')) cls='matched';
      if(step>=3 && f.name==='email') cls='defaulted';
      return {f,cls};
    });

    wEl.innerHTML=wState.map(s=>{
      const d=s.f.default?` = ${s.f.default}`:'';
      return `<div class="avro-row ${s.cls}">${s.f.type} ${s.f.name}${d}</div>`;
    }).join('');
    rEl.innerHTML=rState.map(s=>{
      const d=s.f.default?` = ${s.f.default}`:'';
      return `<div class="avro-row ${s.cls}">${s.f.type} ${s.f.name}${d}</div>`;
    }).join('');
  }
  const statuses=[
    "'다음 규칙 시연'을 눌러 단계별로 진행하세요",
    '규칙 ① · 순서가 달라도 OK — userName과 interests는 이름으로 매칭됨',
    '규칙 ② · writer만 있는 favoriteNumber — reader가 모르니 무시(skipped)',
    '규칙 ③ · reader만 있는 email — reader 스키마의 기본값 "none"으로 채움',
    '✓ 해석 완료 — 모든 필드가 이름 기반 매칭 / 무시 / 기본값으로 처리됨',
  ];

  document.getElementById('avNext').onclick=()=>{
    step=Math.min(4,step+1);
    stEl.textContent=statuses[Math.min(step,4)];
    render();
  };
  document.getElementById('avReset').onclick=()=>{
    step=0;stEl.textContent=statuses[0];render();
  };
  render();
}

  };
  document.getElementById('rpcReset').onclick=reset;
  reset();
}

/* ---- 6. Durable Execution workflow replay ---- */
function setupWorkflow(){
  animState.workflow=true;
  const tasksEl=document.getElementById('wfTasks');
  const stEl=document.getElementById('wfStatus');

  const TASKS=['사기 탐지', '신용카드 출금', '은행 입금', '확인 이메일'];
  // state per task: 'pending' | 'running' | 'done' | 'failed' | 'skipped'
  let state=TASKS.map(()=>'pending');
  let mode='normal'; // 'normal' or 'replay'

  function render(){
    tasksEl.innerHTML=TASKS.map((t,i)=>{
      const cls=state[i]==='pending'?'':state[i];
      const arrow=i<TASKS.length-1?'<span class="wf-arrow">→</span>':'';
      return `<div class="wf-task ${cls}">${i+1}. ${t}</div>${arrow}`;
    }).join('');
  }
  function reset(){
    state=TASKS.map(()=>'pending');
    mode='normal';
    stEl.textContent="시작하려면 '다음 단계'를 누르세요";
    render();
  }

  document.getElementById('wfNext').onclick=()=>{
    if(mode==='replay'){
      stEl.textContent='재실행 모드임. 재실행 버튼을 사용하세요.';
      return;
    }
    // 다음 pending 또는 running → done, running으로
    let runningIdx=state.indexOf('running');
    if(runningIdx>=0){
      state[runningIdx]='done';
      stEl.textContent=`태스크 ${runningIdx+1} "${TASKS[runningIdx]}" 완료 → WAL에 영수증 기록`;
    }
    let nextIdx=state.indexOf('pending');
    if(nextIdx>=0){
      state[nextIdx]='running';
      stEl.textContent+=` · 태스크 ${nextIdx+1} "${TASKS[nextIdx]}" 실행 중...`;
    } else if(state.indexOf('running')<0 && !state.includes('failed')){
      stEl.innerHTML='<b style="color:var(--accent2)">✓ 모든 태스크 완료 — 정확히 한 번 처리됨</b>';
    }
    render();
  };

  document.getElementById('wfFail').onclick=()=>{
    // 처음 2개는 done, 3번째에서 실패
    state=['done','done','failed','pending'];
    mode='normal';
    stEl.innerHTML='<b style="color:var(--accent)">⚠ 태스크 3 "은행 입금" 실패!</b> 신용카드는 청구됐지만 은행 입금이 안 됨 → 재실행이 필요. WAL에는 태스크 1, 2의 영수증이 있음.';
    render();
  };

  document.getElementById('wfReplay').onclick=()=>{
    // 영수증 있는 단계 skip, 실패한 단계부터 다시 시도
    state=['skipped','skipped','running','pending'];
    mode='replay';
    stEl.innerHTML='<b style="color:var(--accent2)">↻ 재실행 시작</b> · 태스크 1, 2는 WAL 영수증이 있으므로 <b>건너뜀</b>(skip). 호출한 척하면서 이전 결과를 반환. 태스크 3부터 다시 실행 시도.';
    render();
    // 1.2초 후 자동으로 진행
    setTimeout(()=>{
      state=['skipped','skipped','done','running'];
      stEl.innerHTML='<b style="color:var(--accent2)">↻ 재실행 진행 중</b> · 태스크 3 "은행 입금" 성공 → 영수증 기록. 태스크 4 실행 중...';
      render();
    }, 1200);
    setTimeout(()=>{
      state=['skipped','skipped','done','done'];
      stEl.innerHTML='<b style="color:var(--accent2)">✓ 재실행 완료</b> · 정확히 한 번 처리됨. 신용카드 출금은 두 번 발생하지 않음 (영수증 덕분).';
      render();
    }, 2400);
  };

  document.getElementById('wfReset').onclick=reset;
  reset();
}

show(0);
</script>
